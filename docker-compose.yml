services:
  mc-server:
    image: itzg/minecraft-server
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"           # Menggunakan PaperMC agar ringan
      VERSION: "1.21.1"       # Versi yang kamu minta
      MEMORY: "2G"            # Alokasi RAM (Sesuaikan dengan plan Zeabur kamu)
      ONLINE_MODE: "FALSE"    # Set FALSE jika kamu pakai Minecraft pak tani/cracked
      ICON: "https://example.com/icon.png" # Opsional: Link foto server
    volumes:
      - mc-data:/data
volumes:
  mc-data:
